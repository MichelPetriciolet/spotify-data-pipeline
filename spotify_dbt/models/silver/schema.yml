version: 2

models:
  - name: stg_spotify_tracks
    description: "Datos limpios y deduplicados de Spotify. Un registro por track_id + metric_date."
    columns:
      - name: track_id
        tests: [not_null]
      - name: metric_date
        tests: [not_null]
      - name: popularity
        tests:
          - not_null
          - accepted_range:
              min_value: 0
              max_value: 100
      - name: genre
        tests: [not_null]
    tests:
      - unique:
          column_name: "track_id || '|' || metric_date::VARCHAR"